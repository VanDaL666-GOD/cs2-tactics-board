<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CS2 Тактическая Доска - VanDaL</title>
  <style>
    body { margin:0; background:#0f0f0f; color:white; font-family:Arial; text-align:center; }
    .tools { padding:15px; background:#1f1f1f; }
    select, button, input { margin:5px; padding:10px 14px; font-size:16px; }
    #container { position:relative; display:inline-block; box-shadow:0 0 25px rgba(0,255,0,0.4); }
    canvas { background:#111; border:3px solid #555; }
  </style>
</head>
<body>
  <h1>CS2 Тактическая Доска</h1>
  
  <div class="tools">
    <select id="mapSelect" style="width:280px">
      <option value="https://i.imgur.com/OFXR7lw.jpg">Ancient</option>
      <option value="https://i.imgur.com/qDml1f0.jpg">Anubis</option>
      <option value="https://i.imgur.com/xewKev7.jpg">Cache</option>
      <option value="https://i.imgur.com/dNuxh6j.jpg">Dust 2</option>
      <option value="https://i.imgur.com/TIgXFBd.jpg">Inferno</option>
      <option value="https://i.imgur.com/mugcxH0.jpg">Nuke</option>
      <option value="https://i.imgur.com/undefined.jpg">Mirage (если не грузит - скажи)</option>
    </select>
    
    <button onclick="loadMap()">✅ Загрузить карту</button>
    <button onclick="clearCanvas()">🗑 Очистить</button>
    <button onclick="undo()">↩ Отменить</button>
    
    <input type="color" id="color" value="#00ff00">
    <label>Толщина: <input type="range" id="size" min="1" max="40" value="8"></label>
    
    <button onclick="addText()">✍ Написать текст</button>
    <button onclick="saveImage()">💾 Скачать</button>
  </div>

  <div id="container">
    <canvas id="canvas" width="1200" height="800"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let history = [];

    function saveHistory() {
      history.push(canvas.toDataURL());
      if (history.length > 25) history.shift();
    }

    function loadMap() {
      const url = document.getElementById('mapSelect').value;
      const img = new Image();
      
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        saveHistory();
        console.log("Карта загружена:", url);
      };
      
      img.onerror = () => alert("Не удалось загрузить карту. Попробуй другую.");
      
      img.src = url;
    }

    // Рисование
    let drawing = false;
    let lastX, lastY;

    canvas.addEventListener('mousedown', e => {
      drawing = true;
      lastX = e.offsetX;
      lastY = e.offsetY;
      saveHistory();
    });

    canvas.addEventListener('mousemove', e => {
      if (!drawing) return;
      ctx.strokeStyle = document.getElementById('color').value;
      ctx.lineWidth = document.getElementById('size').value;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      lastX = e.offsetX;
      lastY = e.offsetY;
    });

    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mouseout', () => drawing = false);

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function undo() {
      if (history.length === 0) return;
      const img = new Image();
      img.src = history.pop();
      img.onload = () => ctx.drawImage(img, 0, 0);
    }

    function addText() {
      const text = prompt("Напиши текст:");
      if (!text) return;
      ctx.font = "bold 30px Arial";
      ctx.fillStyle = document.getElementById('color').value;
      const x = +prompt("X (400)", "400");
      const y = +prompt("Y (300)", "300");
      ctx.fillText(text, x, y);
    }

    function saveImage() {
      const link = document.createElement('a');
      link.download = 'cs2-strat.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Автозагрузка первой карты
    window.onload = loadMap;
  </script>
</body>
</html>
