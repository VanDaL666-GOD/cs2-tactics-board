<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CS2 Тактическая Доска - VanDaL</title>
  <style>
    body { margin:0; background:#0a0a0a; color:white; font-family:Arial; text-align:center; }
    .tools { padding:15px; background:#1a1a1a; }
    select, button, input { margin:5px; padding:10px 14px; font-size:16px; }
    #container { position:relative; display:inline-block; background:#111; padding:10px; border:3px solid #333; }
    canvas { image-rendering: crisp-edges; }
  </style>
</head>
<body>
  <h1>CS2 Тактическая Доска</h1>
  
  <div class="tools">
    <select id="mapSelect" style="width:320px">
      <option value="https://i.imgur.com/TIgXFBd.jpg">Mirage</option>
      <option value="https://i.imgur.com/pMiAYda.jpg">Dust 2</option>
      <option value="https://i.imgur.com/uKayHnR.jpg">Nuke</option>
      <option value="https://i.imgur.com/0pBWPWD.jpg">Anubis</option>
      <option value="https://i.imgur.com/FKwzCGU.jpg">Ancient</option>
      <option value="https://i.imgur.com/ngc0ypx.jpg">Cache</option>
      <option value="https://i.imgur.com/KFv1fqi.jpg">Inferno</option>
    </select>
    
    <button onclick="loadMap()">Загрузить карту</button>
    <button onclick="clearCanvas()">Очистить</button>
    <button onclick="undo()">Отменить</button>
    
    <input type="color" id="color" value="#00ff00">
    <label>Толщина: <input type="range" id="size" min="1" max="40" value="7"></label>
    
    <button onclick="addText()">Написать текст</button>
    <button onclick="saveImage()">Скачать</button>
  </div>

  <div id="container"></div>

  <script>
    let canvas, ctx, historys = [];
    const container = document.getElementById('container');

    function createCanvas(w, h) {
      container.innerHTML = `<canvas id="canvas" width="${w}" height="${h}"></canvas>`;
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      setupDrawing();
    }

    function setupDrawing() {
      let drawing = false, lastX, lastY;

      canvas.addEventListener('mousedown', e => {
        drawing = true;
        lastX = e.offsetX; lastY = e.offsetY;
        saveHistory();
      });

      canvas.addEventListener('mousemove', e => {
        if (!drawing) return;
        ctx.strokeStyle = document.getElementById('color').value;
        ctx.lineWidth = document.getElementById('size').value;
        ctx.lineCap = ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        lastX = e.offsetX; lastY = e.offsetY;
      });

      canvas.addEventListener('mouseup', () => drawing = false);
      canvas.addEventListener('mouseout', () => drawing = false);
    }

    function saveHistory() {
      historys.push(canvas.toDataURL());
      if (historys.length > 25) historys.shift();
    }

    function loadMap() {
      const url = document.getElementById('mapSelect').value;
      const img = new Image();
      img.onload = () => {
        createCanvas(img.width, img.height);
        ctx.drawImage(img, 0, 0);
        saveHistory();
      };
      img.onerror = () => alert("Не удалось загрузить карту");
      img.src = url;
    }

    function clearCanvas() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function undo() {
      if (historys.length === 0 || !ctx) return;
      const img = new Image();
      img.src = historys.pop();
      img.onload = () => ctx.drawImage(img, 0, 0);
    }

    function addText() {
      if (!ctx) return;
      const text = prompt("Текст стратегии:");
      if (!text) return;
      ctx.font = "bold 32px Arial";
      ctx.fillStyle = document.getElementById('color').value;
      const x = +prompt("X", Math.floor(canvas.width/2 - 50));
      const y = +prompt("Y", Math.floor(canvas.height/2));
      ctx.fillText(text, x, y);
    }

    function saveImage() {
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'cs2-strat.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    window.onload = loadMap;
  </script>
</body>
</html>
