<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CS2 Тактическая Доска</title>
  <style>
    body { margin:0; background:#0a0a0a; color:white; font-family:Arial; text-align:center; }
    .tools { padding:15px; background:#1a1a1a; position: sticky; top:0; z-index:10; }
    select, button, input { margin:5px; padding:8px 12px; font-size:16px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
    button:hover { background: #3a3a3a; }
    .player-btn { width:50px; height:50px; font-size:18px; margin:3px; border-radius:50%; border: none; }
    #container { position:relative; display:inline-block; background:#111; padding:10px; border:3px solid #333; margin-top: 20px; }
    canvas { image-rendering: crisp-edges; max-width:100%; height:auto; cursor: crosshair; }
    .active-tool { border: 2px solid #00aaff !important; background: #3a3a3a; }
  </style>
</head>
<body>
  <h1>CS2 Тактическая Доска</h1>
  
  <div class="tools">
    <select id="mapSelect" style="width:340px">
      <option value="https://i.imgur.com/tLQoPWW.jpg">Mirage</option>
      <option value="https://i.imgur.com/pMiAYda.jpg">Dust 2</option>
      <option value="https://i.imgur.com/uKayHnR.jpg">Nuke</option>
      <option value="https://i.imgur.com/0pBWPWD.jpg">Anubis</option>
      <option value="https://i.imgur.com/FKwzCGU.jpg">Ancient</option>
      <option value="https://i.imgur.com/ngc0ypx.jpg">Cache</option>
      <option value="https://i.imgur.com/KFv1fqi.jpg">Inferno</option>
    </select>
    <button onclick="loadMap()">Загрузить карту</button><br><br>

    <div>
      <b>CT:</b> 
      <button class="player-btn" style="background:#00aaff;color:white;" onclick="placePlayer('CT1')">1</button>
      <button class="player-btn" style="background:#00aaff;color:white;" onclick="placePlayer('CT2')">2</button>
      <button class="player-btn" style="background:#00aaff;color:white;" onclick="placePlayer('CT3')">3</button>
      <button class="player-btn" style="background:#00aaff;color:white;" onclick="placePlayer('CT4')">4</button>
      <button class="player-btn" style="background:#00aaff;color:white;" onclick="placePlayer('CT5')">5</button>
    </div>

    <div style="margin:8px 0;">
      <b>T:</b> 
      <button class="player-btn" style="background:#ff8800;color:white;" onclick="placePlayer('T1')">1</button>
      <button class="player-btn" style="background:#ff8800;color:white;" onclick="placePlayer('T2')">2</button>
      <button class="player-btn" style="background:#ff8800;color:white;" onclick="placePlayer('T3')">3</button>
      <button class="player-btn" style="background:#ff8800;color:white;" onclick="placePlayer('T4')">4</button>
      <button class="player-btn" style="background:#ff8800;color:white;" onclick="placePlayer('T5')">5</button>
    </div>

    <div>
      <button id="btn-pen" class="active-tool" onclick="setTool('pen')">✏️ Карандаш</button>
      <button id="btn-eraser" onclick="setTool('eraser')">🧼 Ластик</button>
      
      <label style="margin-left:10px;">Цвет:</label>
      <input type="color" id="color" value="#ff0000" style="padding:0; width:40px; height:35px; vertical-align:middle;">
      
      <label style="margin-left:10px;">Размер:</label>
      <input type="number" id="size" value="5" min="1" max="50" style="width:50px; vertical-align:middle;">

      <button onclick="undo()">↩ Отменить</button>
      <button onclick="clearCanvas()">🗑 Очистить</button>
      <button onclick="addText()">✍ Текст</button>
      <button onclick="saveImage()">💾 Скачать</button>
    </div>
  </div>

  <div id="container"></div>

  <script>
    let canvas, ctx;
    let historys = [];
    let currentTool = 'pen';
    let currentPlayer = null;
    let mapImage = new Image(); // Храним изображение карты отдельно
    const container = document.getElementById('container');

    function createCanvas(w, h) {
      container.innerHTML = `<canvas id="canvas" width="${w}" height="${h}"></canvas>`;
      canvas = document.getElementById('canvas');
      ctx = canvas.getContext('2d');
      setupDrawing();
    }

    function setupDrawing() {
      let drawing = false, lastX, lastY;

      canvas.addEventListener('mousedown', e => {
        if (currentPlayer) {
          saveHistory();
          drawPlayer(e.offsetX, e.offsetY, currentPlayer);
          currentPlayer = null;
          return;
        }
        drawing = true;
        lastX = e.offsetX;
        lastY = e.offsetY;
        saveHistory();
      });

      canvas.addEventListener('mousemove', e => {
        if (!drawing) return;

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(e.offsetX, e.offsetY);

        if (currentTool === 'eraser') {
          // Настоящее стирание до карты
          ctx.globalCompositeOperation = 'destination-out';
          ctx.lineWidth = 35;
        } else {
          ctx.globalCompositeOperation = 'source-over';
          ctx.strokeStyle = document.getElementById('color').value;
          ctx.lineWidth = +document.getElementById('size').value;
        }

        ctx.lineCap = ctx.lineJoin = "round";
        ctx.stroke();
        
        lastX = e.offsetX;
        lastY = e.offsetY;
      });

      canvas.addEventListener('mouseup', () => {
        if(drawing) {
          drawing = false;
        }
      });
      canvas.addEventListener('mouseout', () => drawing = false);
    }

    function setTool(tool) { 
      currentTool = tool; 
      document.getElementById('btn-pen').classList.remove('active-tool');
      document.getElementById('btn-eraser').classList.remove('active-tool');
      document.getElementById('btn-' + tool).classList.add('active-tool');
    }

    function drawPlayer(x, y, label) {
      ctx.globalCompositeOperation = 'source-over';
      const isCT = label.startsWith('CT');
      ctx.fillStyle = isCT ? "#00aaff" : "#ff8800";
      ctx.beginPath();
      ctx.arc(x, y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "white";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = "white";
      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label.replace('CT','').replace('T',''), x, y);
    }

    function placePlayer(label) {
      currentPlayer = label;
    }

    function saveHistory() {
      // Сохраняем состояние только рисунков (без учета фоновой карты в теге img, если бы она была им)
      // В данном случае сохраняем снимок всего холста
      historys.push(canvas.toDataURL());
      if (historys.length > 30) historys.shift();
    }

    function loadMap() {
      const url = document.getElementById('mapSelect').value;
      mapImage = new Image();
      mapImage.crossOrigin = "anonymous"; // Чтобы canvas не «загрязнялся» и позволял скачивать
      mapImage.onload = () => {
        createCanvas(mapImage.width, mapImage.height);
        ctx.drawImage(mapImage, 0, 0);
        historys = []; // Сбрасываем историю при смене карты
      };
      mapImage.onerror = () => alert("Не удалось загрузить карту. Возможно, Imgur блокирует запрос.");
      mapImage.src = url;
    }

    function clearCanvas() {
      if (!ctx) return;
      saveHistory();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(mapImage, 0, 0); // Перерисовываем чистую карту
    }

    function undo() {
      if (historys.length === 0) {
        alert("Нечего отменять");
        return;
      }
      const previousState = historys.pop();
      const img = new Image();
      img.src = previousState;
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(img, 0, 0);
      };
    }

    function addText() {
      if (!ctx) return;
      const text = prompt("Введите текст:");
      if (!text) return;
      const x = +prompt("Координата X (пример: 200):", 200);
      const y = +prompt("Координата Y (пример: 200):", 200);
      
      saveHistory();
      ctx.globalCompositeOperation = 'source-over';
      ctx.font = "bold 30px Arial";
      ctx.fillStyle = document.getElementById('color').value;
      ctx.fillText(text, x, y);
    }

    function saveImage() {
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'cs2-tactics.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    window.onload = loadMap;
  </script>
</body>
</html>
